<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body{% if page.collection == 'tutorials' %} class="is-tutorial"{% endif %}>
  <a class="skip-link" href="#contenido">Saltar al contenido</a>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span>
          <span class="brand-title">{{ site.title }}</span>
          <span class="brand-subtitle">{{ site.description }}</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="Navegación principal">
        <a class="nav-link{% if page.url == '/' %} is-active{% endif %}" href="{{ '/' | relative_url }}">Inicio</a>
        <a class="nav-link{% if page.url contains '/tutorials/' %} is-active{% endif %}" href="{{ '/tutorials/' | relative_url }}">Tutoriales</a>
      </nav>
    </div>
  </header>

  <main class="content" id="contenido">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>© {{ site.time | date: "%Y" }} {{ site.title }}</p>
    </div>
  </footer>
  <script src="{{ '/assets/js/copy-code.js' | relative_url }}" defer></script>
</body>
</html>
